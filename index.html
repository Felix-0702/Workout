<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Performance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Custom Styles for Interactive Elements */
        .active-week { background-color: #e0e7ff; color: #4338ca; box-shadow: inset 0 0 0 1px #c7d2fe; }
        .active-day { background-color: #1e293b; color: white; border-color: #1e293b; transform: translateY(-2px); }
        .exercise-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .exercise-card.done { border-color: #10b981; background-color: #f9fafb; opacity: 0.8; }
        .exercise-card.done h4 { color: #94a3b8; text-decoration: line-through; }
        .checkbox-done { background-color: #10b981; color: white; transform: scale(1.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-32">

    <!-- Header -->
    <header class="bg-indigo-700 text-white p-6 shadow-lg sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold tracking-tight">Hybrid Performance</h1>
                <p class="text-indigo-200 text-xs font-semibold uppercase tracking-wider">Hypertrophy + Running</p>
            </div>
            <button onclick="resetProgress()" class="p-2 bg-indigo-600 rounded-full hover:bg-indigo-500 transition-colors active:scale-90" title="Reset All Progress">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M8 16H3v5"></path></svg>
            </button>
        </div>
    </header>

    <!-- Week Selector -->
    <div class="bg-white border-b border-slate-200 sticky top-[72px] z-40 shadow-sm">
        <div class="max-w-md mx-auto flex justify-around p-2" id="week-tabs">
            <button onclick="changeWeek(1)" id="btn-wk-1" class="flex-1 py-2 mx-1 rounded-lg text-xs font-extrabold transition-all uppercase tracking-tighter">Week 1</button>
            <button onclick="changeWeek(2)" id="btn-wk-2" class="flex-1 py-2 mx-1 rounded-lg text-xs font-extrabold transition-all uppercase tracking-tighter">Week 2</button>
            <button onclick="changeWeek(3)" id="btn-wk-3" class="flex-1 py-2 mx-1 rounded-lg text-xs font-extrabold transition-all uppercase tracking-tighter">Week 3</button>
            <button onclick="changeWeek(4)" id="btn-wk-4" class="flex-1 py-2 mx-1 rounded-lg text-xs font-extrabold transition-all uppercase tracking-tighter text-red-600">Deload</button>
        </div>
    </div>

    <!-- Day Selector -->
    <div class="max-w-md mx-auto mt-4 px-4">
        <div class="flex overflow-x-auto no-scrollbar gap-2 pb-2" id="day-tabs">
            <!-- Rendered by JS -->
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="max-w-md mx-auto mt-2 px-4" id="content-area">
        <!-- Rendered by JS -->
    </main>

    <!-- Progress Footer -->
    <footer class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-200 p-4 pb-8 z-50">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-end mb-2">
                <div>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none" id="progress-week-label">Week 1 Progress</span>
                    <p class="text-2xl font-black text-indigo-900 leading-none mt-1" id="progress-percentage">0%</p>
                </div>
                <div class="text-right">
                    <span class="text-[10px] font-bold text-slate-600 bg-slate-100 px-2 py-1 rounded-md" id="progress-stats">0 / 0 Tasks</span>
                </div>
            </div>
            <div class="h-3 w-full bg-slate-100 rounded-full overflow-hidden border border-slate-200/50">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-indigo-500 to-indigo-700 transition-all duration-700 ease-out shadow-lg shadow-indigo-200" style="width: 0%"></div>
            </div>
        </div>
    </footer>

    <script>
        // --- DATA STRUCTURE ---
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        
        const workoutData = {
            0: { title: "Upper Body A", subtitle: "Chest & Back Focus", type: "lift", exercises: [
                { id: 'bp', name: 'DB Flat Bench Press', sets: 3, reps: '6–8', rpe: '7–8', rest: '2–3m' },
                { id: 'lp', name: 'Lat Pulldown (Cable)', sets: 3, reps: '8–10', rpe: '7–8', rest: '2m' },
                { id: 'ip', name: 'Incline DB Press', sets: 3, reps: '8–10', rpe: '8', rest: '2m' },
                { id: 'sr', name: 'Seated Cable Row', sets: 3, reps: '8–12', rpe: '8', rest: '90s' },
                { id: 'lr', name: 'DB Lateral Raises', sets: 3, reps: '12–15', rpe: '8', rest: '60s' },
                { id: 'tp', name: 'Cable Tricep Pushdowns', sets: 2, reps: '10–12', rpe: '8', rest: '60s' },
                { id: 'bc', name: 'DB Bicep Curls', sets: 2, reps: '10–12', rpe: '8', rest: '60s' },
            ]},
            1: { title: "Lower Body A", subtitle: "Quad Focus", type: "lift", exercises: [
                { id: 'gs', name: 'DB Goblet Squat', sets: 3, reps: '6–8', rpe: '7–8', rest: '2–3m' },
                { id: 'bss', name: 'DB Bulgarian Split Squat', sets: 3, reps: '8–10 (ea)', rpe: '8', rest: '2m' },
                { id: 'rdl', name: 'DB Romanian Deadlift', sets: 3, reps: '8–10', rpe: '8', rest: '2m' },
                { id: 'le', name: 'Leg Extension', sets: 2, reps: '12–15', rpe: '8', rest: '90s' },
                { id: 'cr', name: 'Standing Calf Raises', sets: 3, reps: '12–15', rpe: '8', rest: '60s' },
                { id: 'pl', name: 'Plank', sets: 3, reps: '30–45s', rpe: '7', rest: '60s' },
            ]},
            2: { title: "Interval Run", subtitle: "Aerobic Base", type: 'run', getIntervals: (wk) => {
                return {
                    1: { total: '30m', pattern: '6m Jog / 2m Walk' },
                    2: { total: '30m', pattern: '8m Jog / 2m Walk' },
                    3: { total: '35m', pattern: '10m Jog / 2m Walk' },
                    4: { total: '20m', pattern: '4m Jog / 4m Walk (Easy)' }
                }[wk];
            }},
            3: { title: "Upper Body B", subtitle: "Shoulders & Arms", type: "lift", exercises: [
                { id: 'sp', name: 'DB Shoulder Press', sets: 3, reps: '6–8', rpe: '7–8', rest: '2–3m' },
                { id: 'pu', name: 'Assisted Pull-Ups', sets: 3, reps: '6–8', rpe: '8', rest: '2m' },
                { id: 'cp', name: 'Machine Chest Press', sets: 3, reps: '8–10', rpe: '8', rest: '2m' },
                { id: 'fp', name: 'Cable Face Pulls', sets: 3, reps: '12–15', rpe: '8', rest: '90s' },
                { id: 'hc', name: 'DB Hammer Curls', sets: 2, reps: '10–12', rpe: '8', rest: '60s' },
                { id: 'te', name: 'Overhead Tricep Ext', sets: 2, reps: '10–12', rpe: '8', rest: '60s' },
                { id: 'kr', name: 'Hanging Knee Raises', sets: 3, reps: '10–15', rpe: '8', rest: '60s' },
            ]},
            4: { title: "Lower Body B", subtitle: "Glute & Ham Focus", type: "lift", exercises: [
                { id: 'rdlh', name: 'DB RDL (Heavy)', sets: 3, reps: '6–8', rpe: '7–8', rest: '2–3m' },
                { id: 'su', name: 'DB Step-Ups', sets: 3, reps: '8–10 (ea)', rpe: '8', rest: '2m' },
                { id: 'ht', name: 'DB Hip Thrust', sets: 3, reps: '8–12', rpe: '8', rest: '2m' },
                { id: 'lc', name: 'Lying Leg Curl', sets: 3, reps: '10–12', rpe: '8', rest: '90s' },
                { id: 'scr', name: 'Seated Calf Raises', sets: 3, reps: '12–15', rpe: '8', rest: '60s' },
                { id: 'cc', name: 'Cable Crunches', sets: 3, reps: '12–15', rpe: '8', rest: '60s' },
            ]},
            5: { title: "Long Interval", subtitle: "Stamina Builder", type: 'run', getIntervals: (wk) => {
                return {
                    1: { total: '40m', pattern: '6m Jog / 2m Walk' },
                    2: { total: '45m', pattern: '8m Jog / 1m Walk' },
                    3: { total: '50m', pattern: '12m Jog / 1m Walk' },
                    4: { total: '30m', pattern: '5m Jog / 5m Walk' }
                }[wk];
            }},
            6: { title: "Rest Day", subtitle: "Recovery & Growth", type: 'rest' }
        };

        // --- STATE ---
        let activeWeek = 1;
        let activeDay = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1; // Default to today
        let completedTasks = JSON.parse(localStorage.getItem('hybrid_workout_progress')) || {};

        // --- FUNCTIONS ---
        
        function getAdjustedExercise(ex, week) {
            let sets = ex.sets;
            let rpe = ex.rpe;
            let note = "";

            if (week === 2) { rpe = "8"; note = "Add 2.5–5 lbs"; }
            else if (week === 3) { rpe = "8–9"; note = "Peak Volume"; }
            else if (week === 4) { sets = Math.max(2, ex.sets - 1); rpe = "6–7"; note = "Deload Focus"; }

            return { ...ex, sets, rpe, note };
        }

        function toggleTask(id) {
            const key = `w${activeWeek}-d${activeDay}-${id}`;
            completedTasks[key] = !completedTasks[key];
            
            // Clean up false values to keep storage light
            if (!completedTasks[key]) delete completedTasks[key];
            
            localStorage.setItem('hybrid_workout_progress', JSON.stringify(completedTasks));
            render();
        }

        function changeWeek(w) {
            activeWeek = w;
            render();
        }

        function changeDay(d) {
            activeDay = d;
            render();
        }

        function resetProgress() {
            if (confirm("Are you sure you want to reset all progress? Your saved weights and history will be cleared.")) {
                completedTasks = {};
                localStorage.removeItem('hybrid_workout_progress');
                render();
            }
        }

        function render() {
            // 1. Update Week Buttons
            for (let i = 1; i <= 4; i++) {
                const btn = document.getElementById(`btn-wk-${i}`);
                btn.className = `flex-1 py-2 mx-1 rounded-lg text-xs font-black transition-all uppercase tracking-tighter ${activeWeek === i ? 'active-week' : 'text-slate-400 hover:text-slate-600'}`;
            }

            // 2. Update Day Tabs
            const dayTabs = document.getElementById('day-tabs');
            dayTabs.innerHTML = days.map((day, i) => `
                <button onclick="changeDay(${i})" class="flex-shrink-0 px-5 py-2 rounded-full text-xs font-black border transition-all ${activeDay === i ? 'active-day shadow-lg' : 'bg-white text-slate-500 border-slate-200'}">
                    ${day.toUpperCase()}
                </button>
            `).join('');

            // 3. Render Main Content
            const current = workoutData[activeDay];
            const container = document.getElementById('content-area');
            
            let html = `
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden mb-8">
                    <div class="bg-slate-50 p-5 border-b border-slate-200 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-inner">
                                ${current.type === 'run' ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 16c0-4.4 3.6-8 8-8s8 3.6 8 8"></path><path d="M2 20h20"></path><path d="M12 8V4"></path><path d="M8 4h8"></path></svg>' : current.type === 'rest' ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>' : '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6.5 6.5 11 11"></path><path d="m21 21-1-1"></path><path d="m3 3 1 1"></path><path d="m18 22 4-4"></path><path d="m2 6 4-4"></path><path d="m3 10 7-7"></path><path d="m14 21 7-7"></path></svg>'}
                            </div>
                            <div>
                                <h2 class="font-black text-xl text-slate-800 leading-none">${current.title}</h2>
                                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">${current.subtitle}</p>
                            </div>
                        </div>
                        ${activeWeek > 1 ? `<span class="bg-indigo-100 text-indigo-700 text-[10px] font-black px-2 py-1 rounded-md">LEVEL ${activeWeek}</span>` : ''}
                    </div>
                    <div class="p-4">
            `;

            if (current.type === 'rest') {
                html += `
                    <div class="py-16 text-center">
                        <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10l4.5 4.5"></path><circle cx="12" cy="12" r="10"></circle></svg>
                        </div>
                        <h3 class="font-black text-slate-800 text-lg uppercase tracking-tight">Active Recovery</h3>
                        <p class="text-slate-400 text-sm mt-2 px-8 leading-relaxed">Focus on mobility, hydration, and high protein today. Growth happens in the rest.</p>
                    </div>
                `;
            } else if (current.type === 'run') {
                const key = `w${activeWeek}-d${activeDay}-run-comp`;
                const isDone = completedTasks[key];
                const info = current.getIntervals(activeWeek);
                html += `
                    <div class="space-y-4">
                        <div class="p-6 bg-orange-50 border border-orange-100 rounded-3xl">
                            <span class="text-[10px] font-black text-orange-400 uppercase tracking-[0.2em] mb-2 block">Today's Target</span>
                            <p class="text-4xl font-black text-orange-900 leading-none mb-1">${info.total}</p>
                            <p class="text-orange-700 font-extrabold text-lg">${info.pattern}</p>
                        </div>
                        <button onclick="toggleTask('run-comp')" class="w-full p-6 rounded-3xl border-2 flex items-center justify-between transition-all active:scale-95 ${isDone ? 'bg-emerald-50 border-emerald-500 text-emerald-800' : 'bg-white border-slate-200 text-slate-700 shadow-sm'}">
                            <span class="font-black text-lg uppercase tracking-tight">Complete Session</span>
                            <div class="w-12 h-12 rounded-full flex items-center justify-center transition-all ${isDone ? 'checkbox-done shadow-lg shadow-emerald-200' : 'bg-slate-100'}">
                                ${isDone ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>' : ''}
                            </div>
                        </button>
                    </div>
                `;
            } else {
                html += `<div class="space-y-3">`;
                current.exercises.forEach(rawEx => {
                    const ex = getAdjustedExercise(rawEx, activeWeek);
                    const isDone = completedTasks[`w${activeWeek}-d${activeDay}-${ex.id}`];
                    html += `
                        <div onclick="toggleTask('${ex.id}')" class="exercise-card p-4 rounded-2xl border-2 cursor-pointer transition-all active:scale-[0.98] ${isDone ? 'done' : 'bg-white border-slate-100 hover:border-indigo-100 shadow-sm'}">
                            <div class="flex items-center justify-between">
                                <div class="flex-1 pr-4">
                                    <h4 class="font-black text-base text-slate-800">${ex.name}</h4>
                                    <div class="flex flex-wrap gap-2 mt-2">
                                        <span class="text-[9px] font-black uppercase tracking-widest px-2 py-1 rounded-md ${activeWeek === 4 ? 'bg-red-50 text-red-600' : 'bg-indigo-50 text-indigo-700'}">${ex.sets} SETS × ${ex.reps}</span>
                                        <span class="text-[9px] font-black uppercase tracking-widest text-orange-700 bg-orange-50 px-2 py-1 rounded-md">RPE ${ex.rpe}</span>
                                        <span class="text-[9px] font-bold text-slate-400 flex items-center gap-1"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> ${ex.rest}</span>
                                        ${ex.note ? `<span class="text-[9px] font-black uppercase tracking-widest text-emerald-700 bg-emerald-50 px-2 py-1 rounded-md">${ex.note}</span>` : ''}
                                    </div>
                                </div>
                                <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 transition-all ${isDone ? 'checkbox-done shadow-lg shadow-emerald-200' : 'bg-slate-100 text-slate-300'}">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="transition-transform ${isDone ? 'scale-110' : 'scale-75'}"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            html += `</div></div>`;
            container.innerHTML = html;

            // 4. Update Global Progress Bar
            updateProgressBar();
        }

        function updateProgressBar() {
            let total = 0;
            let completed = 0;
            
            // Total tasks for the week
            Object.keys(workoutData).forEach(d => {
                const day = workoutData[d];
                if (day.exercises) total += day.exercises.length;
                if (day.type === 'run') total += 1;
            });

            // Completed tasks for current week
            Object.keys(completedTasks).forEach(key => {
                if (key.startsWith(`w${activeWeek}-`) && completedTasks[key]) completed++;
            });

            const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
            
            document.getElementById('progress-week-label').innerText = `WEEK ${activeWeek} PROGRESS`;
            document.getElementById('progress-percentage').innerText = `${percent}%`;
            document.getElementById('progress-stats').innerText = `${completed} / ${total} TASKS`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }

        // INIT
        render();
    </script>
</body>
</html>
